<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnus — Branch Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f7f8fc;--white:#fff;--border:#e8eaf0;--text:#1a1d2e;--muted:#7b8299;--admin:#4361ee;--admin-light:#eef1fd;--green:#2dc653;--red:#e63946;--shadow:0 2px 12px rgba(0,0,0,0.07);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .topbar-left{display:flex;align-items:center;gap:10px;min-width:0;}
  .topbar-title{font-size:15px;font-weight:700;white-space:nowrap;} .topbar-title span{color:var(--admin);}
  .inst-badge{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
  .branch-badge{background:var(--admin-light);color:var(--admin);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
  .sign-out-btn{padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:none;font-family:inherit;font-size:12px;cursor:pointer;color:var(--muted);flex-shrink:0;}
  .sign-out-btn:hover{background:#fdecea;color:var(--red);}
  .sidebar-toggle{display:none;background:none;border:none;cursor:pointer;padding:4px 6px;color:var(--text);font-size:22px;line-height:1;flex-shrink:0;}
  .main{display:flex;height:calc(100vh - 56px);overflow:hidden;}
  .sidebar{width:220px;min-width:220px;background:var(--white);border-right:1px solid var(--border);overflow-y:auto;padding:14px 0;transition:transform 0.25s;z-index:200;}
  .sidebar-label{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;padding:8px 14px 4px;}
  .dept-btn{display:flex;align-items:center;gap:10px;width:calc(100% - 12px);padding:9px 12px;border:none;background:none;cursor:pointer;border-radius:7px;font-family:inherit;font-size:13px;font-weight:500;color:var(--text);transition:all 0.15s;text-align:left;margin:0 6px;}
  .dept-btn:hover{background:var(--bg);}
  .dept-btn.active{background:var(--admin-light);color:var(--admin);}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0;}
  .content{flex:1;overflow-y:auto;padding:20px 24px;}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap;}
  .page-title{font-size:16px;font-weight:700;}
  .period-tabs{display:flex;gap:3px;background:var(--bg);border-radius:8px;padding:3px;}
  .period-tab{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--muted);transition:all 0.15s;white-space:nowrap;}
  .period-tab.active{background:var(--white);color:var(--text);box-shadow:var(--shadow);}
  .kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
  .kpi-card{background:var(--white);border-radius:12px;padding:16px;border:1px solid var(--border);box-shadow:var(--shadow);}
  .kpi-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
  .kpi-value{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;}
  .card{background:var(--white);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px;}
  .table-scroll{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:460px;}
  thead tr{background:#f3f4f8;}
  th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;border-bottom:1px solid var(--border);}
  td{padding:10px 14px;border-bottom:1px solid #f0f1f5;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  td input[type="number"]{width:110px;padding:5px 9px;border:1.5px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;font-size:13px;color:var(--text);background:var(--bg);outline:none;transition:border 0.15s;}
  td input[type="number"]:focus{border-color:var(--admin);background:var(--white);}
  .readonly{font-family:'DM Mono',monospace;color:var(--muted);}
  .btn{padding:8px 18px;border-radius:8px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:opacity 0.15s;}
  .btn-primary{background:var(--admin);color:#fff;}
  .btn-primary:hover{opacity:0.88;}
  .var-pos{color:var(--green);font-weight:600;}
  .var-neg{color:var(--red);font-weight:600;}
  .mono{font-family:'DM Mono',monospace;}
  .toast{position:fixed;bottom:20px;right:20px;background:#1a1d2e;color:#fff;padding:10px 20px;border-radius:9px;font-size:13px;font-weight:500;z-index:999;opacity:0;pointer-events:none;transition:opacity 0.25s;}
  .toast.show{opacity:1;}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:150;}
  .sidebar-overlay.show{display:block;}
  /* Collection bars */
  .coll-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px;}
  .coll-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
  .coll-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .coll-title{font-size:15px;font-weight:700;}
  .coll-pct{margin-left:auto;font-size:13px;font-weight:700;}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .bar-label{width:48px;font-size:11px;font-weight:600;color:var(--muted);text-align:right;flex-shrink:0;}
  .bar-track{flex:1;background:#eef0f5;border-radius:4px;height:24px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;transition:width 0.4s;}
  .bar-val{width:90px;font-size:12px;font-family:'DM Mono',monospace;font-weight:600;flex-shrink:0;}
  .coll-input-row{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);}
  .coll-input-label{font-size:12px;font-weight:600;color:var(--muted);}
  .coll-input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border 0.15s;}
  .coll-input:focus{border-color:var(--admin);}
  ::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#d0d3de;border-radius:10px;}
  @media(max-width:640px){
    .sidebar-toggle{display:block;}
    .sidebar{position:fixed;top:56px;left:0;height:calc(100vh - 56px);transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .kpi-row{grid-template-columns:1fr 1fr;}
    .content{padding:14px 12px;}
    .inst-badge{display:none;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <div class="topbar-title"><span>Magnus</span></div>
    <span class="inst-badge" id="instBadge"></span>
    <span class="branch-badge" id="branchBadge">Loading…</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
    <div class="period-tabs">
      <button class="period-tab active" data-period="monthly" onclick="setPeriod('monthly')">Monthly</button>
      <button class="period-tab" data-period="w1" onclick="setPeriod('w1')">W1</button>
      <button class="period-tab" data-period="w2" onclick="setPeriod('w2')">W2</button>
      <button class="period-tab" data-period="w3" onclick="setPeriod('w3')">W3</button>
      <button class="period-tab" data-period="w4" onclick="setPeriod('w4')">W4</button>
    </div>
    <button class="sign-out-btn" id="signOutBtn">Sign Out</button>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-label">Departments</div>
    <div id="sidebarDepts"></div>
    <div class="sidebar-label" style="margin-top:8px">Other</div>
    <button class="dept-btn" data-dept="COLLECTION" onclick="selectDept('COLLECTION')">
      <span class="dot" style="background:#2dc653"></span> Collection
    </button>
  </div>
  <div class="content" id="content">
    <div style="text-align:center;padding:60px;color:var(--muted)">Loading…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SB = createClient(
  'https://jcckxekjaetwoeilptse.supabase.co',
  'sb_publishable_20hUKqtjjIPDgdAreDsBTQ_yalRVevL',
  { auth: { persistSession: true, storageKey: 'magnus-auth', storage: window.localStorage } }
);

// Auth
const { data: { session } } = await SB.auth.getSession();
if (!session) { window.location.href = 'login.html'; }
const { data: profile } = await SB.from('profiles').select('*').eq('id', session.user.id).single();
if (!profile) { window.location.href = 'login.html'; }
if (profile.role === 'admin') { window.location.href = 'index.html'; }

const params = new URLSearchParams(window.location.search);
const BRANCH = params.get('branch') || profile.branch_name;
const INSTITUTE = params.get('institute') || profile.institute_name || '';

document.getElementById('branchBadge').textContent = BRANCH;
document.getElementById('instBadge').textContent = INSTITUTE;
document.getElementById('signOutBtn').onclick = async () => { await SB.auth.signOut(); window.location.href = 'login.html'; };

let currentDept = null;
let currentPeriod = 'monthly';
let depts = [];

function fmt(n) { if (!n && n !== 0) return '—'; return '₹' + Number(n).toLocaleString('en-IN'); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = '✓ ' + msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }

window.toggleSidebar = () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
};
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

// Load departments — try with institute_name first, fall back to branch_name only
async function loadDepts() {
  let q = SB.from('departments').select('*').eq('branch_name', BRANCH).order('name');
  if (INSTITUTE) q = q.eq('institute_name', INSTITUTE);
  let { data, error } = await q;
  if (error || !data?.length) {
    ({ data } = await SB.from('departments').select('*').eq('branch_name', BRANCH).order('name'));
  }
  return data || [];
}

depts = await loadDepts();

const sidebarEl = document.getElementById('sidebarDepts');
depts.forEach(d => {
  const btn = document.createElement('button');
  btn.className = 'dept-btn';
  btn.dataset.dept = d.name;
  btn.innerHTML = `<span class="dot" style="background:${d.color}"></span> ${d.name.charAt(0) + d.name.slice(1).toLowerCase()}`;
  btn.onclick = () => selectDept(d.name);
  sidebarEl.appendChild(btn);
});

if (depts.length) selectDept(depts[0].name);

window.setPeriod = (p) => {
  currentPeriod = p;
  document.querySelectorAll('.period-tab').forEach(t => t.classList.toggle('active', t.dataset.period === p));
  if (currentDept) selectDept(currentDept);
};

window.selectDept = async (name) => {
  currentDept = name;
  document.querySelectorAll('.dept-btn').forEach(b => b.classList.toggle('active', b.dataset.dept === name));
  closeSidebar();
  if (name === 'COLLECTION') { await renderCollection(); return; }
  await renderDept(name);
};

// Helper: query with institute fallback
async function sbQuery(table, cols, extraFilters) {
  let q = SB.from(table).select(cols).eq('branch_name', BRANCH);
  if (INSTITUTE) q = q.eq('institute_name', INSTITUTE);
  extraFilters.forEach(([col, val]) => { q = q.eq(col, val); });
  let { data, error } = await q;
  if (error || !data?.length) {
    let q2 = SB.from(table).select(cols).eq('branch_name', BRANCH);
    extraFilters.forEach(([col, val]) => { q2 = q2.eq(col, val); });
    ({ data } = await q2);
  }
  return data || [];
}

// Helper: upsert with institute fallback
async function sbUpsert(table, rows, conflictCol) {
  if (!rows.length) return;
  // Try with institute_name
  const withInst = rows.map(r => ({ ...r, institute_name: INSTITUTE }));
  const conflictWithInst = INSTITUTE ? `institute_name,${conflictCol}` : conflictCol;
  const { error } = await SB.from(table).upsert(withInst, { onConflict: conflictWithInst });
  if (error) {
    // Fallback: upsert without institute_name
    const { error: e2 } = await SB.from(table).upsert(rows, { onConflict: conflictCol });
    if (e2) { alert('Save error: ' + e2.message); return false; }
  }
  return true;
}

async function renderDept(deptName) {
  const content = document.getElementById('content');
  content.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">Loading…</div>';

  const dept = depts.find(d => d.name === deptName);
  const color = dept?.color || '#4361ee';

  const [fields, budgets, actuals] = await Promise.all([
    sbQuery('fields', '*', [['dept_name', deptName], ['sort_order', undefined]].filter(x => x[1] !== undefined)
      .concat([['dept_name', deptName]])).then(() =>
      SB.from('fields').select('*').eq('branch_name', BRANCH).eq('dept_name', deptName).order('sort_order').order('id')
        .then(r => r.data || [])
    ),
    sbQuery('budget_data', 'field_key,value', [['dept_name', deptName], ['period', currentPeriod]]),
    sbQuery('actual_data', 'field_key,value', [['dept_name', deptName], ['period', currentPeriod]])
  ]);

  const budgetMap = {}; budgets.forEach(r => budgetMap[r.field_key] = Number(r.value));
  const actualMap = {}; actuals.forEach(r => actualMap[r.field_key] = Number(r.value));

  let totalB = 0, totalA = 0;
  const rows = fields.map(f => {
    const key = f.category + '__' + f.subcategory;
    const b = budgetMap[key] || 0, a = actualMap[key] || 0, v = b - a;
    const p = b ? Math.round((a / b) * 100) : 0;
    totalB += b; totalA += a;
    return `<tr>
      <td><span style="color:${color};font-weight:600;font-size:12px">${f.category}</span></td>
      <td>${f.subcategory}</td>
      <td class="readonly">${fmt(b)}</td>
      <td><input type="number" min="0" value="${a || ''}" placeholder="0" data-key="${key}" class="actual-input" /></td>
      <td class="${v >= 0 ? 'var-pos' : 'var-neg'} mono">${v >= 0 ? '+' : ''}${fmt(v)}</td>
      <td style="font-size:12px;color:var(--muted)">${b ? p + '%' : '—'}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--muted)">No fields set up yet</td></tr>';

  const tv = totalB - totalA;
  content.innerHTML = `
    <div class="page-header">
      <div class="page-title" style="color:${color}">${deptName}</div>
      <button class="btn btn-primary" onclick="saveActuals('${deptName}')">💾 Save</button>
    </div>
    <div class="kpi-row">
      <div class="kpi-card"><div class="kpi-label">Budget</div><div class="kpi-value" style="color:var(--admin)">${fmt(totalB)}</div></div>
      <div class="kpi-card"><div class="kpi-label">Actual</div><div class="kpi-value" style="color:${totalA > totalB ? 'var(--red)' : 'var(--green)'}">${fmt(totalA)}</div></div>
      <div class="kpi-card"><div class="kpi-label">Variance</div><div class="kpi-value" style="color:${tv < 0 ? 'var(--red)' : 'var(--green)'}">${tv >= 0 ? '+' : ''}${fmt(tv)}</div></div>
    </div>
    <div class="card"><div class="table-scroll"><table>
      <thead><tr><th>Category</th><th>Sub-category</th><th>Budget (₹)</th><th>Actual (₹)</th><th>Variance</th><th>%</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr style="background:#f3f4f8;font-weight:700">
        <td colspan="2">TOTAL</td>
        <td class="mono">${fmt(totalB)}</td>
        <td class="mono">${fmt(totalA)}</td>
        <td class="mono ${tv >= 0 ? 'var-pos' : 'var-neg'}">${tv >= 0 ? '+' : ''}${fmt(tv)}</td>
        <td>${totalB ? Math.round((totalA / totalB) * 100) + '%' : '—'}</td>
      </tr></tfoot>
    </table></div></div>`;
}

window.saveActuals = async (deptName) => {
  const inputs = document.querySelectorAll('.actual-input');
  const rows = [];
  inputs.forEach(inp => {
    rows.push({ branch_name: BRANCH, dept_name: deptName, field_key: inp.dataset.key, period: currentPeriod, value: Number(inp.value) || 0, updated_at: new Date().toISOString() });
  });
  if (!rows.length) return;
  const ok = await sbUpsert('actual_data', rows, 'branch_name,dept_name,field_key,period');
  if (ok) { showToast('Saved'); await renderDept(deptName); }
};

async function renderCollection() {
  const content = document.getElementById('content');
  content.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">Loading…</div>';

  const coll = await sbQuery('collection_data', '*', [['period', currentPeriod]]);
  const smt = coll.find(r => r.source === 'SMT') || { target: 0, actual: 0 };
  const cmt = coll.find(r => r.source === 'CMT') || { target: 0, actual: 0 };
  const maxVal = Math.max(smt.target || 0, smt.actual || 0, cmt.target || 0, cmt.actual || 0, 1);

  const makeCard = (src, color, d) => {
    const t = d.target || 0, a = d.actual || 0;
    const tW = Math.round((t / maxVal) * 100);
    const aW = Math.round((a / maxVal) * 100);
    const over = a > t;
    const p = t ? Math.round((a / t) * 100) : 0;
    return `<div class="coll-card">
      <div class="coll-header">
        <div class="coll-dot" style="background:${color}"></div>
        <div class="coll-title">${src}</div>
        <div class="coll-pct" style="color:${over ? 'var(--red)' : 'var(--green)'}">${t ? p + '%' : '—'}</div>
      </div>
      <div class="bar-row">
        <div class="bar-label">Target</div>
        <div class="bar-track"><div class="bar-fill" style="width:${tW}%;background:${color}"></div></div>
        <div class="bar-val" style="color:${color}">${fmt(t)}</div>
      </div>
      <div class="bar-row">
        <div class="bar-label">Actual</div>
        <div class="bar-track"><div class="bar-fill" style="width:${aW}%;background:${over ? 'var(--red)' : 'var(--green)'}"></div></div>
        <div class="bar-val" style="color:${over ? 'var(--red)' : 'var(--green)'}">${fmt(a)}</div>
      </div>
      <div class="coll-input-row">
        <div class="coll-input-label">Enter Actual:</div>
        <input class="coll-input" type="number" min="0" value="${a || ''}" placeholder="0" id="coll_${src}" />
      </div>
    </div>`;
  };

  const totT = (smt.target || 0) + (cmt.target || 0);
  const totA = (smt.actual || 0) + (cmt.actual || 0);

  content.innerHTML = `
    <div class="page-header">
      <div class="page-title">Collection Analysis</div>
      <button class="btn btn-primary" onclick="saveCollection()">💾 Save</button>
    </div>
    <div class="kpi-row">
      <div class="kpi-card"><div class="kpi-label">SMT Target</div><div class="kpi-value" style="color:var(--admin)">${fmt(smt.target || 0)}</div></div>
      <div class="kpi-card"><div class="kpi-label">CMT Target</div><div class="kpi-value" style="color:#f77f00">${fmt(cmt.target || 0)}</div></div>
      <div class="kpi-card"><div class="kpi-label">Total Actual</div><div class="kpi-value" style="color:var(--green)">${fmt(totA)}</div></div>
    </div>
    ${makeCard('SMT', '#4361ee', smt)}
    ${makeCard('CMT', '#f77f00', cmt)}`;
}

window.saveCollection = async () => {
  const rows = ['SMT', 'CMT'].map(src => ({
    branch_name: BRANCH, period: currentPeriod, source: src,
    actual: Number(document.getElementById('coll_' + src)?.value) || 0,
    updated_at: new Date().toISOString()
  }));
  const ok = await sbUpsert('collection_data', rows, 'branch_name,period,source');
  if (ok) { showToast('Saved'); await renderCollection(); }
};
</script>
</body>
</html>
