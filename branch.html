<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnus Institute — Branch Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#f7f8fc;--white:#fff;--border:#e8eaf0;--text:#1a1d2e;--muted:#7b8299;--admin:#4361ee;--admin-light:#eef1fd;--green:#2dc653;--red:#e63946;--shadow:0 2px 12px rgba(0,0,0,0.07); }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .topbar-title{font-size:15px;font-weight:700;flex-shrink:0;} .topbar-title span{color:var(--admin);}
  .branch-badge{background:var(--admin-light);color:var(--admin);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;max-width:100px;overflow:hidden;text-overflow:ellipsis;}
  .sign-out-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:none;font-family:inherit;font-size:12px;cursor:pointer;color:var(--muted);white-space:nowrap;flex-shrink:0;}
  .sign-out-btn:hover{background:#fdecea;color:var(--red);}
  .sidebar-toggle{display:none;background:none;border:none;cursor:pointer;padding:4px 8px;color:var(--text);font-size:22px;line-height:1;flex-shrink:0;}
  .main{display:flex;height:calc(100vh - 56px);overflow:hidden;position:relative;}
  .sidebar{width:220px;min-width:220px;background:var(--white);border-right:1px solid var(--border);overflow-y:auto;padding:14px 0;transition:transform 0.25s;z-index:200;}
  .sidebar-label{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;padding:8px 14px 4px;}
  .dept-btn{display:flex;align-items:center;gap:10px;width:calc(100% - 12px);padding:9px 12px;border:none;background:none;cursor:pointer;border-radius:7px;font-family:inherit;font-size:13px;font-weight:500;color:var(--text);transition:all 0.15s;text-align:left;margin:0 6px;}
  .dept-btn:hover{background:var(--bg);}
  .dept-btn.active{background:var(--admin-light);color:var(--admin);}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0;}
  .content{flex:1;overflow-y:auto;padding:20px 16px;}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap;}
  .page-title{font-size:16px;font-weight:700;}
  .period-tabs{display:flex;gap:3px;background:var(--bg);border-radius:8px;padding:3px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;}
  .period-tab{padding:5px 10px;border-radius:6px;font-size:12px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--muted);transition:all 0.15s;white-space:nowrap;}
  .period-tab.active{background:var(--white);color:var(--text);box-shadow:var(--shadow);}
  .kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
  .kpi-card{background:var(--white);border-radius:12px;padding:14px;border:1px solid var(--border);box-shadow:var(--shadow);}
  .kpi-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
  .kpi-value{font-size:17px;font-weight:700;font-family:'DM Mono',monospace;}
  .card{background:var(--white);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px;}
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:460px;}
  thead tr{background:#f3f4f8;}
  th{padding:10px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;}
  td{padding:10px 12px;border-bottom:1px solid #f0f1f5;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  td input[type="number"]{width:100px;padding:5px 8px;border:1.5px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;font-size:13px;color:var(--text);background:var(--bg);outline:none;transition:border 0.15s;}
  td input[type="number"]:focus{border-color:var(--admin);background:var(--white);}
  .readonly{font-family:'DM Mono',monospace;color:var(--muted);}
  .btn{padding:8px 16px;border-radius:8px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:opacity 0.15s;}
  .btn-primary{background:var(--admin);color:#fff;}
  .btn-primary:hover{opacity:0.88;}
  .toast{position:fixed;bottom:16px;right:16px;left:16px;background:#1a1d2e;color:#fff;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:500;z-index:999;opacity:0;pointer-events:none;transition:opacity 0.25s;text-align:center;}
  .toast.show{opacity:1;}
  .var-pos{color:var(--green);font-weight:600;}
  .var-neg{color:var(--red);font-weight:600;}
  .mono{font-family:'DM Mono',monospace;}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:150;}
  .sidebar-overlay.show{display:block;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#d0d3de;border-radius:10px;}

  @media(max-width:640px){
    .topbar-title{font-size:13px;}
    .sidebar-toggle{display:block;}
    .sidebar{position:fixed;top:56px;left:0;height:calc(100vh - 56px);transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .kpi-row{grid-template-columns:1fr 1fr;}
    .content{padding:12px 10px;}
    .page-title{font-size:14px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:8px;min-width:0">
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <div class="topbar-title"><span>Magnus</span> Institute</div>
    <span class="branch-badge" id="branchBadge">Loading…</span>
  </div>
  <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
    <div class="period-tabs">
      <button class="period-tab active" data-period="monthly" onclick="setPeriod('monthly')">Monthly</button>
      <button class="period-tab" data-period="w1" onclick="setPeriod('w1')">W1</button>
      <button class="period-tab" data-period="w2" onclick="setPeriod('w2')">W2</button>
      <button class="period-tab" data-period="w3" onclick="setPeriod('w3')">W3</button>
      <button class="period-tab" data-period="w4" onclick="setPeriod('w4')">W4</button>
    </div>
    <button class="sign-out-btn" id="signOutBtn">Sign Out</button>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-label">Departments</div>
    <div id="sidebarDepts"></div>
    <div class="sidebar-label" style="margin-top:8px">Other</div>
    <button class="dept-btn" data-dept="COLLECTION" onclick="selectDept('COLLECTION')">
      <span class="dot" style="background:#2dc653"></span> Collection
    </button>
  </div>
  <div class="content" id="content">
    <div style="text-align:center;padding:60px;color:var(--muted)">Loading your branch data…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://jcckxekjaetwoeilptse.supabase.co',
  'sb_publishable_20hUKqtjjIPDgdAreDsBTQ_yalRVevL'
);

const { data: { session } } = await supabase.auth.getSession();
if (!session) { window.location.href = 'login.html'; }
const { data: profile } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
if (!profile) { window.location.href = 'login.html'; }
if (profile.role === 'admin') { window.location.href = 'index.html'; }

const BRANCH = new URLSearchParams(window.location.search).get('branch') || profile.branch_name;
document.getElementById('branchBadge').textContent = BRANCH;
document.getElementById('signOutBtn').onclick = async () => { await supabase.auth.signOut(); window.location.href = 'login.html'; };

let currentDept = null;
let currentPeriod = 'monthly';
let depts = [];

function fmt(n) { if (!n && n!==0) return '—'; return '₹'+Number(n).toLocaleString('en-IN'); }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent='✓ '+msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

window.toggleSidebar = () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
};

const { data: deptsData } = await supabase.from('departments').select('*').eq('branch_name', BRANCH).order('name');
depts = deptsData || [];

const sidebarEl = document.getElementById('sidebarDepts');
depts.forEach(d => {
  const btn = document.createElement('button');
  btn.className = 'dept-btn';
  btn.dataset.dept = d.name;
  btn.innerHTML = `<span class="dot" style="background:${d.color}"></span> ${d.name.charAt(0)+d.name.slice(1).toLowerCase()}`;
  btn.onclick = () => selectDept(d.name);
  sidebarEl.appendChild(btn);
});

if (depts.length) selectDept(depts[0].name);

window.setPeriod = (p) => {
  currentPeriod = p;
  document.querySelectorAll('.period-tab').forEach(t => t.classList.toggle('active', t.dataset.period===p));
  if (currentDept) selectDept(currentDept);
};

window.selectDept = async (name) => {
  currentDept = name;
  document.querySelectorAll('.dept-btn').forEach(b => b.classList.toggle('active', b.dataset.dept===name));
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
  if (name === 'COLLECTION') { renderCollection(); return; }
  renderDept(name);
};

async function renderDept(deptName) {
  const content = document.getElementById('content');
  content.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">Loading…</div>';

  const dept = depts.find(d=>d.name===deptName);
  const color = dept?.color || '#4361ee';

  const [{ data: fields }, { data: budgets }, { data: actuals }] = await Promise.all([
    supabase.from('fields').select('*').eq('branch_name',BRANCH).eq('dept_name',deptName).order('sort_order').order('id'),
    supabase.from('budget_data').select('field_key,value').eq('branch_name',BRANCH).eq('dept_name',deptName).eq('period',currentPeriod),
    supabase.from('actual_data').select('field_key,value').eq('branch_name',BRANCH).eq('dept_name',deptName).eq('period',currentPeriod)
  ]);

  const budgetMap = {}; (budgets||[]).forEach(r=>budgetMap[r.field_key]=Number(r.value));
  const actualMap = {}; (actuals||[]).forEach(r=>actualMap[r.field_key]=Number(r.value));

  let totalB=0, totalA=0;
  const rows = (fields||[]).map(f => {
    const key = f.category+'__'+f.subcategory;
    const b = budgetMap[key]||0, a = actualMap[key]||0, v = b-a;
    const p = b ? Math.round((a/b)*100) : 0;
    totalB+=b; totalA+=a;
    return `<tr>
      <td><span style="color:${color};font-weight:600;font-size:12px">${f.category}</span></td>
      <td>${f.subcategory}</td>
      <td class="readonly">${fmt(b)}</td>
      <td><input type="number" min="0" value="${a||''}" placeholder="0" data-key="${key}" class="actual-input" /></td>
      <td class="${v>=0?'var-pos':'var-neg'} mono">${v>=0?'+':''}${fmt(v)}</td>
      <td style="font-size:12px;color:var(--muted)">${b?p+'%':'—'}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--muted)">No fields set up yet</td></tr>';

  const tv = totalB-totalA;
  content.innerHTML = `
    <div class="page-header">
      <div class="page-title" style="color:${color}">${deptName}</div>
      <button class="btn btn-primary" onclick="saveActuals('${deptName}')">💾 Save</button>
    </div>
    <div class="kpi-row">
      <div class="kpi-card"><div class="kpi-label">Budget</div><div class="kpi-value" style="color:var(--admin)">${fmt(totalB)}</div></div>
      <div class="kpi-card"><div class="kpi-label">Actual</div><div class="kpi-value" style="color:${totalA>totalB?'var(--red)':'var(--green)'}">${fmt(totalA)}</div></div>
      <div class="kpi-card"><div class="kpi-label">Variance</div><div class="kpi-value" style="color:${tv<0?'var(--red)':'var(--green)'}">${tv>=0?'+':''}${fmt(tv)}</div></div>
    </div>
    <div class="card"><div class="table-scroll"><table>
      <thead><tr><th>Category</th><th>Sub-category</th><th>Budget (₹)</th><th>Actual (₹)</th><th>Variance</th><th>%</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr style="background:#f3f4f8;font-weight:700">
        <td colspan="2">TOTAL</td>
        <td class="mono">${fmt(totalB)}</td>
        <td class="mono">${fmt(totalA)}</td>
        <td class="mono ${tv>=0?'var-pos':'var-neg'}">${tv>=0?'+':''}${fmt(tv)}</td>
        <td>${totalB?Math.round((totalA/totalB)*100)+'%':'—'}</td>
      </tr></tfoot>
    </table></div></div>`;
}

window.saveActuals = async (deptName) => {
  const inputs = document.querySelectorAll('.actual-input');
  const upserts = [];
  inputs.forEach(inp => {
    upserts.push({
      branch_name: BRANCH, dept_name: deptName,
      field_key: inp.dataset.key, period: currentPeriod,
      value: Number(inp.value)||0, updated_at: new Date().toISOString()
    });
  });
  if (!upserts.length) return;
  const { error } = await supabase.from('actual_data').upsert(upserts, { onConflict: 'branch_name,dept_name,field_key,period' });
  if (error) { alert('Error: '+error.message); return; }
  showToast('Saved');
  renderDept(deptName);
};

async function renderCollection() {
  const content = document.getElementById('content');
  const { data: coll } = await supabase.from('collection_data').select('*').eq('branch_name',BRANCH).eq('period',currentPeriod);
  const smt = (coll||[]).find(r=>r.source==='SMT') || {target:0,actual:0};
  const cmt = (coll||[]).find(r=>r.source==='CMT') || {target:0,actual:0};

  content.innerHTML = `
    <div class="page-header">
      <div class="page-title">Collection Analysis</div>
      <button class="btn btn-primary" onclick="saveCollection()">💾 Save</button>
    </div>
    <div class="card"><div class="table-scroll"><table style="min-width:360px">
      <thead><tr><th>Source</th><th>Target (₹)</th><th>Actual (₹)</th><th>Variance</th><th>%</th></tr></thead>
      <tbody>
        ${['SMT','CMT'].map(src => {
          const d = src==='SMT'?smt:cmt;
          const t=d.target||0, a=d.actual||0, v=a-t, p=t?Math.round((a/t)*100):0;
          return `<tr>
            <td><strong>${src}</strong></td>
            <td class="readonly">${fmt(t)}</td>
            <td><input type="number" min="0" value="${a||''}" placeholder="0" id="coll_${src}" /></td>
            <td class="mono ${v>=0?'var-pos':'var-neg'}">${v>=0?'+':''}${fmt(v)}</td>
            <td>${t?p+'%':'—'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div></div>`;
}

window.saveCollection = async () => {
  const upserts = ['SMT','CMT'].map(src => ({
    branch_name: BRANCH, period: currentPeriod, source: src,
    actual: Number(document.getElementById('coll_'+src)?.value)||0,
    updated_at: new Date().toISOString()
  }));
  const { error } = await supabase.from('collection_data').upsert(upserts, { onConflict: 'branch_name,period,source' });
  if (error) { alert('Error: '+error.message); return; }
  showToast('Collection saved');
  renderCollection();
};
</script>
</body>
</html>
