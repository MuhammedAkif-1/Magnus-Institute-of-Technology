<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Business Overview</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f7f8fc;--white:#fff;--border:#e8eaf0;--text:#1a1d2e;
    --muted:#7b8299;--admin:#4361ee;--admin-light:#eef1fd;
    --green:#2dc653;--red:#e63946;
    --shadow:0 2px 12px rgba(0,0,0,0.07);--shadow-lg:0 8px 32px rgba(0,0,0,0.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  .topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .topbar-title{font-size:17px;font-weight:700;letter-spacing:-0.3px;}
  .topbar-title span{color:var(--admin);}
  .sign-out-btn{padding:6px 14px;border-radius:7px;border:1px solid var(--border);background:none;font-family:inherit;font-size:13px;cursor:pointer;color:var(--muted);}
  .sign-out-btn:hover{background:#fdecea;color:var(--red);border-color:#fdecea;}

  .page{max-width:1100px;margin:0 auto;padding:32px 28px;}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .page-title{font-size:20px;font-weight:700;letter-spacing:-0.3px;}
  .page-sub{font-size:13px;color:var(--muted);margin-top:3px;}

  .grand-kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:24px;}
  .grand-kpi-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px 22px;box-shadow:var(--shadow);}
  .grand-kpi-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
  .grand-kpi-val{font-size:26px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-1px;}

  /* Institute accordion */
  .institute-list{display:flex;flex-direction:column;gap:12px;}

  .institute-block{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}

  .institute-header{
    display:flex;align-items:center;gap:12px;padding:18px 22px;cursor:pointer;
    transition:background 0.15s;user-select:none;
  }
  .institute-header:hover{background:var(--bg);}
  .institute-arrow{font-size:12px;color:var(--muted);transition:transform 0.2s;flex-shrink:0;}
  .institute-arrow.open{transform:rotate(90deg);}
  .institute-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
  .institute-name{font-size:15px;font-weight:700;flex:1;}
  .institute-meta{font-size:12px;color:var(--muted);font-weight:500;}
  .inst-header-totals{display:flex;gap:20px;margin-left:auto;margin-right:8px;}
  .inst-ht{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
  .inst-ht-val{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;}
  .inst-ht-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;}

  .inst-kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;padding:20px 22px 4px;}
  .inst-kpi-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px 20px;}
  .inst-kpi-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
  .inst-kpi-val{font-size:24px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-1px;}
  .institute-actions{display:flex;gap:8px;margin-left:8px;}
  .add-branch-btn{
    padding:5px 13px;border-radius:7px;border:1.5px dashed var(--border);
    background:none;font-family:inherit;font-size:12px;font-weight:600;
    color:var(--muted);cursor:pointer;transition:all 0.15s;
  }
  .add-branch-btn:hover{border-color:var(--admin);color:var(--admin);background:var(--admin-light);}

  .institute-body{display:none;padding:0 22px 20px;border-top:1px solid var(--border);}
  .institute-body.open{display:block;}

  .branches-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:18px;}

  .branch-card{
    background:var(--white);border:1px solid var(--border);border-radius:12px;
    overflow:hidden;transition:box-shadow 0.18s,transform 0.18s;
  }
  .branch-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);}

  .branch-card-top{padding:16px 18px 12px;display:flex;align-items:center;gap:10px;}
  .branch-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .branch-card-name{font-size:14px;font-weight:700;flex:1;}
  .branch-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 5px;border-radius:4px;opacity:0;transition:opacity 0.15s;}
  .branch-card:hover .branch-del{opacity:1;}
  .branch-del:hover{color:var(--red);background:#fdecea;}

  .branch-stats{display:grid;grid-template-columns:1fr 1fr 1fr;padding:12px 18px;gap:6px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg);}
  .stat{text-align:center;}
  .stat-val{font-size:17px;font-weight:700;font-family:'DM Mono',monospace;}
  .stat-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}

  .branch-footer{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;}
  .open-btn{
    padding:7px 18px;border-radius:8px;border:none;background:var(--admin);
    color:#fff;font-family:inherit;font-size:12px;font-weight:600;
    cursor:pointer;text-decoration:none;display:inline-block;transition:opacity 0.15s;
  }
  .open-btn:hover{opacity:0.88;}

  .empty-branches{padding:24px;text-align:center;color:var(--muted);font-size:13px;}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(26,29,46,0.45);z-index:200;display:flex;align-items:center;justify-content:center;}
  .modal{background:var(--white);border-radius:14px;padding:28px;width:400px;max-width:95vw;box-shadow:var(--shadow-lg);}
  .modal-title{font-size:15px;font-weight:700;margin-bottom:18px;}
  .modal-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:5px;display:block;}
  .modal-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;outline:none;transition:border 0.15s;margin-bottom:14px;}
  .modal-input:focus{border-color:var(--admin);}
  .color-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
  .color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border 0.15s;}
  .color-swatch.selected{border-color:var(--text);}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;}
  .modal-cancel{padding:8px 18px;border-radius:7px;border:1px solid var(--border);background:none;font-family:inherit;font-size:13px;cursor:pointer;color:var(--muted);}
  .modal-cancel:hover{background:var(--bg);}
  .modal-save{padding:8px 22px;border-radius:7px;border:none;background:var(--admin);color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}
  .modal-save:hover{opacity:0.88;}

  .toast{position:fixed;bottom:24px;right:24px;background:#1a1d2e;color:#fff;padding:10px 20px;border-radius:9px;font-size:13px;font-weight:500;z-index:999;opacity:0;pointer-events:none;transition:opacity 0.25s;}
  .toast.show{opacity:1;}

  ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#d0d3de;border-radius:10px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title"><span>Magnus</span> Admin Portal</div>
  <div style="display:flex;align-items:center;gap:10px">
    <span style="font-size:12px;font-weight:600;background:var(--admin-light);color:var(--admin);padding:4px 12px;border-radius:20px">Admin</span>
    <button class="sign-out-btn" id="signOutBtn">Sign Out</button>
  </div>
</div>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Business Overview</div>
      <div class="page-sub">Select a business to view and manage its branches</div>
    </div>
    <button onclick="openAddInstituteModal()" style="padding:8px 18px;border-radius:8px;border:none;background:var(--admin);color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer">＋ Add Institute</button>
  </div>
  <div class="grand-kpi-row">
    <div class="grand-kpi-card"><div class="grand-kpi-label">Total Budget</div><div class="grand-kpi-val" id="grandBudget" style="color:var(--admin)">—</div></div>
    <div class="grand-kpi-card"><div class="grand-kpi-label">Total Actual</div><div class="grand-kpi-val" id="grandActual" style="color:var(--text)">—</div></div>
    <div class="grand-kpi-card"><div class="grand-kpi-label">Total Variance</div><div class="grand-kpi-val" id="grandVariance" style="color:var(--muted)">—</div></div>
  </div>
  <div class="institute-list" id="instituteList">
    <div style="text-align:center;padding:60px;color:var(--muted)">Loading…</div>
  </div>
</div>

<!-- Add Institute Modal -->
<div class="modal-overlay" id="addInstituteModal" style="display:none" onclick="if(event.target===this)closeInstituteModal()">
  <div class="modal">
    <div class="modal-title">Add Institute</div>
    <label class="modal-label">Institute Name</label>
    <input class="modal-input" id="instituteNameInput" type="text" placeholder="e.g. New College" onkeydown="if(event.key==='Enter')saveInstitute()" />
    <label class="modal-label">Color</label>
    <div class="color-row" id="instColorSwatches"></div>
    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeInstituteModal()">Cancel</button>
      <button class="modal-save" onclick="saveInstitute()">Add Institute</button>
    </div>
  </div>
</div>

<!-- Add Branch Modal -->
<div class="modal-overlay" id="addBranchModal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add Branch</div>
    <label class="modal-label">Branch Name</label>
    <input class="modal-input" id="branchNameInput" type="text" placeholder="e.g. Calicut" onkeydown="if(event.key==='Enter')saveBranch()" />
    <label class="modal-label">Color</label>
    <div class="color-row" id="colorSwatches"></div>
    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-save" onclick="saveBranch()">Add Branch</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
  'https://jcckxekjaetwoeilptse.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjY2t4ZWtqYWV0d29laWxwdHNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Njk3MzMsImV4cCI6MjA5MjU0NTczM30.8P32oelb13Bu9FBlWQXTIfeRS-KQtaX_J8lAvSlpmBk',
  { auth: { persistSession: true, storageKey: 'magnus-auth', storage: window.localStorage } }
);

// Auth
const { data: { session } } = await supabase.auth.getSession();
if (!session) { window.location.href = 'login.html'; }
const { data: profile } = await supabase.from('profiles').select('role').eq('id', session.user.id).single();
if (!profile || profile.role !== 'admin') { window.location.href = 'login.html'; }

document.getElementById('signOutBtn').onclick = async () => { await supabase.auth.signOut(); window.location.href = 'login.html'; };

const PALETTE = ['#4361ee','#f77f00','#7b2d8b','#2ec4b6','#e63946','#06d6a0','#118ab2','#ef476f','#ffd166','#073b4c'];
let selectedColor = PALETTE[0];
let _addingToInstitute = '';
let openInstitute = '';

function fmt(n) { if (!n && n !== 0) return '—'; return '₹' + Number(n).toLocaleString('en-IN'); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = '✓ ' + msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }

// Build color swatches for branch modal
const sc = document.getElementById('colorSwatches');
PALETTE.forEach(c => {
  const s = document.createElement('div');
  s.className = 'color-swatch' + (c === selectedColor ? ' selected' : '');
  s.style.background = c;
  s.onclick = () => { selectedColor = c; document.querySelectorAll('#colorSwatches .color-swatch').forEach(sw => sw.classList.toggle('selected', sw.style.background === c)); };
  sc.appendChild(s);
});

// Build color swatches for institute modal
let instSelectedColor = PALETTE[0];
const isc = document.getElementById('instColorSwatches');
PALETTE.forEach(c => {
  const s = document.createElement('div');
  s.className = 'color-swatch' + (c === instSelectedColor ? ' selected' : '');
  s.style.background = c;
  s.onclick = () => {
    instSelectedColor = c;
    document.querySelectorAll('#instColorSwatches .color-swatch').forEach(sw => sw.classList.toggle('selected', sw.style.background === c));
  };
  isc.appendChild(s);
});

window.openAddInstituteModal = () => {
  instSelectedColor = PALETTE[0];
  document.getElementById('instituteNameInput').value = '';
  document.querySelectorAll('#instColorSwatches .color-swatch').forEach((s,i) => s.classList.toggle('selected', i===0));
  document.getElementById('addInstituteModal').style.display = 'flex';
  setTimeout(() => document.getElementById('instituteNameInput').focus(), 50);
};
window.closeInstituteModal = () => document.getElementById('addInstituteModal').style.display = 'none';
window.saveInstitute = async () => {
  const name = document.getElementById('instituteNameInput').value.trim();
  if (!name) { alert('Enter an institute name.'); return; }
  const { error } = await supabase.from('institutes').insert({ name, color: instSelectedColor });
  if (error) { alert('Error: ' + error.message); return; }
  closeInstituteModal();
  showToast('Institute added');
  await loadOverview();
};

function fmtShort(n) {
  if (!n && n !== 0) return '—';
  if (Math.abs(n) >= 1e7) return '₹' + (n/1e7).toFixed(1) + 'Cr';
  if (Math.abs(n) >= 1e5) return '₹' + (n/1e5).toFixed(1) + 'L';
  return '₹' + Number(n).toLocaleString('en-IN');
}

const branchDataCache = {};

async function loadBranchData(instituteName, branches) {
  const uncached = branches.filter(b => !branchDataCache[(instituteName||'')+'||'+b.name]);
  if (uncached.length) {
    const branchNames = uncached.map(b => b.name);
    const [budgetRes, actualRes] = await Promise.all([
      supabase.from('budget_data').select('institute_name,branch_name,value').eq('institute_name', instituteName).in('branch_name', branchNames),
      supabase.from('actual_data').select('institute_name,branch_name,value').eq('institute_name', instituteName).in('branch_name', branchNames)
    ]);
    const budgetByKey = {};
    (budgetRes.data || []).forEach(r => {
      const k = (r.institute_name||'') + '||' + r.branch_name;
      budgetByKey[k] = (budgetByKey[k]||0) + Number(r.value||0);
    });
    const actualByKey = {};
    (actualRes.data || []).forEach(r => {
      const k = (r.institute_name||'') + '||' + r.branch_name;
      actualByKey[k] = (actualByKey[k]||0) + Number(r.value||0);
    });
    uncached.forEach(b => {
      const k = (instituteName||'') + '||' + b.name;
      branchDataCache[k] = { budget: budgetByKey[k]||0, actual: actualByKey[k]||0 };
    });
  }
}

async function loadOverview() {
  document.getElementById('instituteList').innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted)">Loading…</div>';
  const [instRes, branchRes, deptRes, budgetRes, actualRes] = await Promise.all([
    supabase.from('institutes').select('name,color').order('name'),
    supabase.from('branches').select('institute_name,name,color').order('name'),
    supabase.from('departments').select('institute_name,branch_name'),
    supabase.from('budget_data').select('institute_name,branch_name,value'),
    supabase.from('actual_data').select('institute_name,branch_name,value')
  ]);

  // Build per-branch and per-institute totals
  const budgetByBranch = {}, actualByBranch = {}, budgetByInst = {}, actualByInst = {};
  let grandBudget = 0, grandActual = 0;
  (budgetRes.data || []).forEach(r => {
    const bk = (r.institute_name||'') + '||' + r.branch_name;
    budgetByBranch[bk] = (budgetByBranch[bk]||0) + Number(r.value||0);
    budgetByInst[r.institute_name||''] = (budgetByInst[r.institute_name||'']||0) + Number(r.value||0);
    grandBudget += Number(r.value||0);
    // Also populate cache
    if (!branchDataCache[bk]) branchDataCache[bk] = { budget: 0, actual: 0 };
    branchDataCache[bk].budget = budgetByBranch[bk];
  });
  (actualRes.data || []).forEach(r => {
    const bk = (r.institute_name||'') + '||' + r.branch_name;
    actualByBranch[bk] = (actualByBranch[bk]||0) + Number(r.value||0);
    actualByInst[r.institute_name||''] = (actualByInst[r.institute_name||'']||0) + Number(r.value||0);
    grandActual += Number(r.value||0);
    if (!branchDataCache[bk]) branchDataCache[bk] = { budget: 0, actual: 0 };
    branchDataCache[bk].actual = actualByBranch[bk];
  });

  // Grand total KPIs
  const grandVar = grandBudget - grandActual;
  document.getElementById('grandBudget').textContent = fmtShort(grandBudget);
  document.getElementById('grandActual').textContent = fmtShort(grandActual);
  document.getElementById('grandActual').style.color = grandActual > grandBudget ? 'var(--red)' : 'var(--text)';
  document.getElementById('grandVariance').textContent = grandBudget||grandActual ? (grandVar>0?'+':'')+fmtShort(grandVar) : '—';
  document.getElementById('grandVariance').style.color = grandVar < 0 ? 'var(--red)' : grandVar > 0 ? 'var(--green)' : 'var(--muted)';

  if (instRes.error) {
    instRes.data = [
      { name: 'Magnus Institute of Technology', color: '#4361ee' },
      { name: 'Alims School of Business', color: '#f77f00' },
      { name: 'MEL Islamic School', color: '#7b2d8b' },
      { name: 'M&D Institute', color: '#2ec4b6' },
      { name: 'Merchx', color: '#e63946' },
      { name: 'Aider India', color: '#06d6a0' }
    ];
  }

  const institutes = instRes.data || [];
  const branches = branchRes.data || [];
  const depts = deptRes.data || [];

  const deptCountByKey = {};
  depts.forEach(d => {
    const k = (d.institute_name||'') + '||' + d.branch_name;
    deptCountByKey[k] = (deptCountByKey[k]||0) + 1;
  });

  const branchesByInstitute = {};
  branches.forEach(b => {
    const inst = b.institute_name || 'Unknown';
    if (!branchesByInstitute[inst]) branchesByInstitute[inst] = [];
    branchesByInstitute[inst].push(b);
  });

  const list = document.getElementById('instituteList');
  list.innerHTML = '';

  if (!institutes.length) {
    list.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted);font-size:14px">No institutes found.</div>';
    return;
  }

  institutes.forEach(inst => {
    const instBranches = branchesByInstitute[inst.name] || [];
    const isOpen = openInstitute === inst.name;
    const block = document.createElement('div');
    block.className = 'institute-block';

    const branchCards = instBranches.map(b => {
      const k = (inst.name||'') + '||' + b.name;
      const deptCount = deptCountByKey[k] || 0;
      const cached = branchDataCache[k] || {};
      const budget = cached.budget || 0;
      const actual = cached.actual || 0;
      const variance = budget - actual;
      const varColor = variance < 0 ? 'var(--red)' : variance > 0 ? 'var(--green)' : 'var(--muted)';
      const varPrefix = variance > 0 ? '+' : '';
      return `
        <div class="branch-card" style="border-top:3px solid ${b.color}">
          <div class="branch-card-top">
            <div class="branch-color-dot" style="background:${b.color}"></div>
            <div class="branch-card-name">${b.name}</div>
            <button class="branch-del" onclick="deleteBranch('${inst.name.replace(/'/g,"\\'")}','${b.name.replace(/'/g,"\\'")}')">✕</button>
          </div>
          <div class="branch-stats">
            <div class="stat"><div class="stat-val" style="color:var(--admin);font-size:13px">${fmtShort(budget)}</div><div class="stat-label">Budget</div></div>
            <div class="stat"><div class="stat-val" style="color:var(--text);font-size:13px">${fmtShort(actual)}</div><div class="stat-label">Actual</div></div>
            <div class="stat"><div class="stat-val" style="color:${varColor};font-size:13px">${budget||actual ? varPrefix+fmtShort(variance) : '—'}</div><div class="stat-label">Variance</div></div>
          </div>
          <div class="branch-footer">
            <span style="font-size:11px;color:var(--muted)">${deptCount} dept${deptCount!==1?'s':''}</span>
            <a class="open-btn" href="admin.html?institute=${encodeURIComponent(inst.name)}&branch=${encodeURIComponent(b.name)}">Open →</a>
          </div>
        </div>`;
    }).join('') || '<div class="empty-branches">No branches yet. Add one!</div>';

    const instBudget = budgetByInst[inst.name] || 0;
    const instActual = actualByInst[inst.name] || 0;
    const instVar = instBudget - instActual;
    const instVarColor = instVar < 0 ? 'var(--red)' : instVar > 0 ? 'var(--green)' : 'var(--muted)';

    block.innerHTML = `
      <div class="institute-header" onclick="toggleInstitute('${inst.name.replace(/'/g,"\\'")}')">
        <span class="institute-arrow ${isOpen?'open':''}">▶</span>
        <div class="institute-dot" style="background:${inst.color}"></div>
        <div class="institute-name">${inst.name}</div>
        <div class="institute-meta">${instBranches.length} branch${instBranches.length!==1?'es':''}</div>
        <div class="inst-header-totals">
          <div class="inst-ht"><div class="inst-ht-val" style="color:var(--admin)">${fmtShort(instBudget)}</div><div class="inst-ht-label">Budget</div></div>
          <div class="inst-ht"><div class="inst-ht-val" style="color:${instActual>instBudget?'var(--red)':'var(--text)'}">${fmtShort(instActual)}</div><div class="inst-ht-label">Actual</div></div>
          <div class="inst-ht"><div class="inst-ht-val" style="color:${instVarColor}">${instBudget||instActual?(instVar>0?'+':'')+fmtShort(instVar):'—'}</div><div class="inst-ht-label">Variance</div></div>
        </div>
        <div class="institute-actions" onclick="event.stopPropagation()">
          <button class="add-branch-btn" onclick="openAddBranchModal('${inst.name.replace(/'/g,"\\'")}')">＋ Add Branch</button>
        </div>
      </div>
      <div class="institute-body ${isOpen?'open':''}">
        <div class="inst-kpi-row">
          <div class="inst-kpi-card"><div class="inst-kpi-label">Total Budget</div><div class="inst-kpi-val inst-budget" style="color:var(--admin)">${fmtShort(instBudget)}</div></div>
          <div class="inst-kpi-card"><div class="inst-kpi-label">Total Actual</div><div class="inst-kpi-val inst-actual" style="color:${instActual>instBudget?'var(--red)':'var(--text)'}">${fmtShort(instActual)}</div></div>
          <div class="inst-kpi-card"><div class="inst-kpi-label">Variance</div><div class="inst-kpi-val inst-variance" style="color:${instVarColor}">${instBudget||instActual?(instVar>0?'+':'')+fmtShort(instVar):'—'}</div></div>
        </div>
        <div class="branches-grid">${branchCards}</div>
      </div>`;
    list.appendChild(block);
  });
}

window.toggleInstitute = async (name) => {
  const wasOpen = openInstitute === name;
  openInstitute = wasOpen ? '' : name;
  document.querySelectorAll('.institute-block').forEach(block => {
    const arrow = block.querySelector('.institute-arrow');
    const body = block.querySelector('.institute-body');
    const instName = block.querySelector('.institute-name').textContent;
    const isOpen = instName === name && openInstitute === name;
    arrow.classList.toggle('open', isOpen);
    body.classList.toggle('open', isOpen);
  });
};

window.openAddBranchModal = (instituteName) => {
  _addingToInstitute = instituteName;
  document.getElementById('modalTitle').textContent = `Add Branch — ${instituteName}`;
  document.getElementById('branchNameInput').value = '';
  selectedColor = PALETTE[0];
  document.querySelectorAll('.color-swatch').forEach((s,i) => s.classList.toggle('selected', i===0));
  document.getElementById('addBranchModal').style.display = 'flex';
  setTimeout(() => document.getElementById('branchNameInput').focus(), 50);
};

window.closeModal = () => document.getElementById('addBranchModal').style.display = 'none';

window.saveBranch = async () => {
  const name = document.getElementById('branchNameInput').value.trim();
  if (!name) { alert('Enter a branch name.'); return; }
  const { error } = await supabase.from('branches').insert({ institute_name: _addingToInstitute, name, color: selectedColor });
  if (error) { alert('Error: ' + error.message); return; }
  closeModal();
  showToast('Branch added');
  openInstitute = _addingToInstitute;
  await loadOverview();
};

window.deleteBranch = async (instituteName, branchName) => {
  if (!confirm(`Delete branch "${branchName}" from ${instituteName} and ALL its data?`)) return;
  const results = await Promise.all([
    supabase.from('branches').delete().eq('institute_name', instituteName).eq('name', branchName),
    supabase.from('departments').delete().eq('institute_name', instituteName).eq('branch_name', branchName),
    supabase.from('fields').delete().eq('institute_name', instituteName).eq('branch_name', branchName),
    supabase.from('budget_data').delete().eq('institute_name', instituteName).eq('branch_name', branchName),
    supabase.from('actual_data').delete().eq('institute_name', instituteName).eq('branch_name', branchName),
    supabase.from('collection_data').delete().eq('institute_name', instituteName).eq('branch_name', branchName),
  ]);
  const deleteError = results.find(r => r.error);
  if (deleteError) { alert('Error deleting: ' + deleteError.error.message); return; }
  showToast('Branch deleted');
  openInstitute = instituteName;
  await loadOverview();
};

// Auto-open institute from URL param
const _instParam = new URLSearchParams(window.location.search).get('institute');
if (_instParam) openInstitute = _instParam;
loadOverview();
</script>
</body>
</html>
